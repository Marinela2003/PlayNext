<section class="admin-page">

<h2>Admin Dashboard</h2>

<div class="admin-form">

<input
type="text"
id="gameTitle"
placeholder="Game Title">

<input
type="text"
id="gameGenre"
placeholder="Genre">

<input
type="text"
id="gameRelease"
placeholder="Release Date">

<input
type="text"
id="gameDeveloper"
placeholder="Developer">

<input
type="text"
id="gamePublisher"
placeholder="Publisher">

<textarea
id="gameDescription"
placeholder="Description">
</textarea>

<input
type="text"
id="gameImage"
placeholder="Image (example: images/game10.png)">

<button id="addGameBtn">

Add Game

</button>

<hr>

<h2>Manage Games</h2>

<div id="gamesList"></div>

</div>
